# Default agent type configurations for lince-dashboard.
#
# Read by: lince-dashboard WASM plugin — defines how to spawn, display, and
# monitor each agent type in the TUI. Different schema from sandbox's
# agents-defaults.toml (which configures the bwrap jail per agent).
#
# Each [agents.<name>] section defines an agent type. Users can override any
# agent type by adding [agents.<name>] sections to their config.toml.
#
# Command templates support placeholders:
#   {agent_id}    - unique agent identifier (e.g. "agent-1")
#   {project_dir} - project directory path
#   {profile}     - sandbox profile name

[agents.claude]
command = ["agent-sandbox", "run", "-p", "{project_dir}", "--id", "{agent_id}"]
pane_title_pattern = "agent-sandbox"
status_pipe_name = "claude-status"
display_name = "Claude Code"
short_label = "CLA"
color = "blue"
sandboxed = true
has_native_hooks = true
home_ro_dirs = ["~/.claude/"]
profiles = ["__discover__"]

[agents.claude-unsandboxed]
command = ["claude"]
pane_title_pattern = "claude"
status_pipe_name = "claude-status"
display_name = "Claude Code (unsandboxed)"
short_label = "CLU"
color = "red"
sandboxed = false
has_native_hooks = true
profiles = ["__discover__"]

[agents.codex]
command = ["codex", "--full-auto"]
pane_title_pattern = "codex"
status_pipe_name = "lince-status"
display_name = "OpenAI Codex (unsandboxed)"
short_label = "CDX"
color = "cyan"
sandboxed = false
has_native_hooks = false
ignore_wrapper_start = true
bwrap_conflict = false
profiles = ["__discover__"]

[agents.codex.env_vars]
OPENAI_API_KEY = "$OPENAI_API_KEY"

[agents.codex-bwrap]
command = ["agent-sandbox", "run", "-p", "{project_dir}", "--id", "{agent_id}", "--agent", "codex"]
pane_title_pattern = "agent-sandbox"
status_pipe_name = "lince-status"
display_name = "OpenAI Codex (sandboxed)"
short_label = "CDX"
color = "cyan"
sandboxed = true
has_native_hooks = false
ignore_wrapper_start = true
bwrap_conflict = true
disable_inner_sandbox_args = ["--sandbox", "danger-full-access"]
home_ro_dirs = ["~/.codex/"]
profiles = ["__discover__"]

[agents.codex-bwrap.env_vars]
OPENAI_API_KEY = "$OPENAI_API_KEY"

[agents.gemini]
command = ["gemini"]
pane_title_pattern = "gemini"
status_pipe_name = "lince-status"
display_name = "Google Gemini CLI"
short_label = "GEM"
color = "yellow"
sandboxed = false
has_native_hooks = false
disable_inner_sandbox_args = []
profiles = ["__discover__"]

[agents.gemini.env_vars]
GEMINI_API_KEY = "$GEMINI_API_KEY"

[agents.gemini-bwrap]
command = ["agent-sandbox", "run", "-p", "{project_dir}", "--id", "{agent_id}", "--agent", "gemini"]
pane_title_pattern = "agent-sandbox"
status_pipe_name = "lince-status"
display_name = "Google Gemini CLI (sandboxed)"
short_label = "GEM"
color = "yellow"
sandboxed = true
has_native_hooks = false
bwrap_conflict = false
disable_inner_sandbox_args = []
home_ro_dirs = ["~/.gemini/"]
profiles = ["__discover__"]

[agents.gemini-bwrap.env_vars]
GEMINI_API_KEY = "$GEMINI_API_KEY"

[agents.opencode]
command = ["opencode"]
pane_title_pattern = "opencode"
status_pipe_name = "lince-status"
display_name = "OpenCode"
short_label = "OPC"
color = "green"
sandboxed = false
has_native_hooks = false
home_ro_dirs = ["~/.config/opencode/"]
profiles = ["__discover__"]

[agents.opencode-bwrap]
command = ["agent-sandbox", "run", "-p", "{project_dir}", "--id", "{agent_id}", "--agent", "opencode"]
pane_title_pattern = "agent-sandbox"
status_pipe_name = "lince-status"
display_name = "OpenCode (sandboxed)"
short_label = "OPC"
color = "green"
sandboxed = true
has_native_hooks = false
bwrap_conflict = false
disable_inner_sandbox_args = []
home_ro_dirs = ["~/.config/opencode/"]
profiles = ["__discover__"]

# ── nono-sandboxed variants ─────────────────────────────────────────
# nono uses Landlock LSM on Linux and Seatbelt on macOS.
# Profiles are named "lince-<agent>" and managed by `agent-sandbox nono-sync`.

[agents.claude-nono]
command = ["nono", "run", "--profile", "lince-claude", "--workdir", "{project_dir}", "--", "claude", "--dangerously-skip-permissions"]
pane_title_pattern = "nono"
status_pipe_name = "claude-status"
display_name = "Claude Code (nono)"
short_label = "CLA"
color = "blue"
sandboxed = true
has_native_hooks = true
sandbox_backend = "nono"
home_ro_dirs = ["~/.claude/"]
profiles = ["__discover__"]

[agents.codex-nono]
command = ["nono", "run", "--profile", "lince-codex", "--workdir", "{project_dir}", "--", "codex", "--full-auto"]
pane_title_pattern = "nono"
status_pipe_name = "lince-status"
display_name = "OpenAI Codex (nono)"
short_label = "CDX"
color = "cyan"
sandboxed = true
has_native_hooks = false
ignore_wrapper_start = true
sandbox_backend = "nono"
bwrap_conflict = false
disable_inner_sandbox_args = ["--sandbox", "danger-full-access"]
home_ro_dirs = ["~/.codex/"]
profiles = ["__discover__"]

[agents.codex-nono.env_vars]
OPENAI_API_KEY = "$OPENAI_API_KEY"

[agents.gemini-nono]
command = ["nono", "run", "--profile", "lince-gemini", "--workdir", "{project_dir}", "--", "gemini"]
pane_title_pattern = "nono"
status_pipe_name = "lince-status"
display_name = "Google Gemini CLI (nono)"
short_label = "GEM"
color = "yellow"
sandboxed = true
has_native_hooks = false
sandbox_backend = "nono"
bwrap_conflict = false
disable_inner_sandbox_args = []
home_ro_dirs = ["~/.gemini/"]
profiles = ["__discover__"]

[agents.gemini-nono.env_vars]
GEMINI_API_KEY = "$GEMINI_API_KEY"

[agents.opencode-nono]
# Bun-based binaries crash (SIGABRT) when spawned as subprocesses under Landlock.
# Resolve the native binary and exec it directly, bypassing the Node.js launcher's
# spawnSync which triggers the Bun/Landlock incompatibility.
command = ["nono", "run", "--profile", "lince-opencode", "--workdir", "{project_dir}", "--", "bash", "-c", "exec \"$(dirname \"$(readlink -f \"$(which opencode)\")\")/.opencode\" \"$@\"", "--"]
pane_title_pattern = "nono"
status_pipe_name = "lince-status"
display_name = "OpenCode (nono)"
short_label = "OPC"
color = "green"
sandboxed = true
has_native_hooks = false
sandbox_backend = "nono"
bwrap_conflict = false
disable_inner_sandbox_args = []
home_ro_dirs = ["~/.config/opencode/"]
profiles = ["__discover__"]

[agents.pi]
command = ["pi"]
pane_title_pattern = "pi"
status_pipe_name = "lince-status"
display_name = "Pi"
short_label = "PI "
color = "magenta"
sandboxed = false
has_native_hooks = true
home_ro_dirs = ["~/.pi/"]
profiles = ["__discover__"]

[agents.pi.env_vars]
ANTHROPIC_API_KEY = "$ANTHROPIC_API_KEY"
OPENAI_API_KEY = "$OPENAI_API_KEY"
GEMINI_API_KEY = "$GEMINI_API_KEY"

[agents.pi-bwrap]
command = ["agent-sandbox", "run", "-p", "{project_dir}", "--id", "{agent_id}", "--agent", "pi"]
pane_title_pattern = "agent-sandbox"
status_pipe_name = "lince-status"
display_name = "Pi (sandboxed)"
short_label = "PI "
color = "magenta"
sandboxed = true
has_native_hooks = true
bwrap_conflict = false
disable_inner_sandbox_args = []
home_ro_dirs = ["~/.pi/"]
profiles = ["__discover__"]

[agents.pi-bwrap.env_vars]
ANTHROPIC_API_KEY = "$ANTHROPIC_API_KEY"
OPENAI_API_KEY = "$OPENAI_API_KEY"
GEMINI_API_KEY = "$GEMINI_API_KEY"

[agents.pi-nono]
command = ["nono", "run", "--profile", "lince-pi", "--workdir", "{project_dir}", "--", "pi"]
pane_title_pattern = "nono"
status_pipe_name = "lince-status"
display_name = "Pi (nono)"
short_label = "PI "
color = "magenta"
sandboxed = true
has_native_hooks = true
sandbox_backend = "nono"
bwrap_conflict = false
disable_inner_sandbox_args = []
home_ro_dirs = ["~/.pi/"]
profiles = ["__discover__"]

[agents.pi-nono.env_vars]
ANTHROPIC_API_KEY = "$ANTHROPIC_API_KEY"
OPENAI_API_KEY = "$OPENAI_API_KEY"
GEMINI_API_KEY = "$GEMINI_API_KEY"
