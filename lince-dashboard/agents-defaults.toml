# Default agent type configurations for lince-dashboard.
#
# Read by: lince-dashboard WASM plugin — defines how to spawn, display, and
# monitor each agent type in the TUI. Different schema from sandbox's
# agents-defaults.toml (which configures the bwrap jail per agent).
#
# Each [agents.<name>] section defines an agent type. Users can override any
# agent type by adding [agents.<name>] sections to their config.toml.
#
# Command templates support placeholders:
#   {agent_id}    - unique agent identifier (e.g. "agent-1")
#   {project_dir} - project directory path
#   {provider}    - provider name (env-var bundle: anthropic / vertex / zai / ...)
#   {profile}     - legacy alias for {provider}, kept for back-compat (gh#81)
#
# Note: there are TWO orthogonal axes that historically shared the word
# "profile":
#   * sandbox profile = isolation level (paranoid / normal / permissive),
#     selected via the `sandbox_level` field below.
#   * provider = env-var bundle (Anthropic vs Vertex vs Z.ai vs ...),
#     selected via the `providers` field below and the wizard's "Provider" step.
# These are independent — you can run e.g. `paranoid + zai`. See gh#81.
#
# Sandbox model (claude, codex, gemini, opencode, pi):
#   - sandbox_backend = "bwrap" | "nono"  (default per OS)
#   - sandbox_level   = "paranoid" | "normal" | "permissive" | <custom>
# When sandbox_level is set, the plugin synthesizes the launch command from
# (agent_type, backend, level) — the `command` field below is then ignored
# but kept for legacy/no-level fallback. See:
#   docs/documentation/dashboard/sandbox-levels.md
#   https://lince.sh/documentation/#/dashboard/sandbox-levels
#
# sandbox_level here is the *default selection* in the wizard's SandboxLevel
# step. Users can override it per-spawn via the [N] wizard — no need to
# maintain separate paranoid/permissive agent-type entries any more.
#
# Custom sandbox levels are auto-discovered by the wizard — drop a profile
# file under one of these paths and it will appear in the SandboxLevel step:
#   - nono backend (always agent-specific):
#       ~/.config/nono/profiles/lince-<agent>-<level>.json
#       (e.g. lince-claude-strict.json adds "strict" for claude only)
#   - agent-sandbox backend (either form is supported):
#       ~/.agent-sandbox/profiles/<agent>-<level>.toml   (agent-specific)
#       ~/.agent-sandbox/profiles/<level>.toml           (applies to all agents)
# The shipped defaults paranoid/normal/permissive always appear regardless of
# what's on disk.
#
# Alternative paranoid / permissive variants in `agents-template.toml`
# (sibling file, NOT loaded by the dashboard) are now redundant with the
# wizard. They continue to work if already present in config.toml, but
# new installs need only this file.

[agents.claude]
# Legacy fallback command — ignored when sandbox_level is set (the plugin
# synthesizes the actual command from sandbox_backend + sandbox_level).
command = ["agent-sandbox", "run", "-p", "{project_dir}", "--id", "{agent_id}"]
pane_title_pattern = "agent-sandbox"
status_pipe_name = "claude-status"
display_name = "Claude Code"
short_label = "CLA"
# Color follows the sandbox-level gradient (basic ANSI palette):
#   paranoid=green, normal=blue, permissive=yellow, unsandboxed=red
# The same palette drives the per-pane title indicator and the "N" wizard's
# Provider step when the provider name happens to match a level keyword
# (gh#63). Override via [dashboard.sandbox_colors] in
# ~/.config/lince-dashboard/config.toml — see docs/documentation/dashboard/
# sandbox-levels.md §1.1.
color = "blue"
sandboxed = true
has_native_hooks = true
home_ro_dirs = ["~/.claude/"]
providers = ["__discover__"]
sandbox_level = "normal"          # paranoid | normal | permissive (or custom; see docs)
# sandbox_backend defaults to "agent-sandbox" (bwrap) on Linux, "nono" on macOS.
# Uncomment to force a specific backend (overrides the OS default):
# sandbox_backend = "nono"

[agents.claude-unsandboxed]
command = ["claude"]
pane_title_pattern = "claude"
status_pipe_name = "claude-status"
display_name = "Claude Code (unsandboxed)"
short_label = "CLU"
color = "red"
sandboxed = false
has_native_hooks = true
providers = ["__discover__"]

[agents.codex]
# Legacy fallback command — ignored when sandbox_level is set.
command = ["agent-sandbox", "run", "-p", "{project_dir}", "--id", "{agent_id}", "--agent", "codex"]
pane_title_pattern = "agent-sandbox"
status_pipe_name = "lince-status"
display_name = "OpenAI Codex"
short_label = "CDX"
color = "cyan"
sandboxed = true
has_native_hooks = false
ignore_wrapper_start = true
# Disables codex's own --sandbox so it doesn't fight ours.
bwrap_conflict = true
disable_inner_sandbox_args = ["--sandbox", "danger-full-access"]
home_ro_dirs = ["~/.codex/"]
providers = ["__discover__"]
sandbox_level = "normal"          # paranoid | normal | permissive (or custom; see docs)
# sandbox_backend defaults to bwrap on Linux, nono on macOS. Uncomment to override:
# sandbox_backend = "nono"

[agents.codex.env_vars]
OPENAI_API_KEY = "$OPENAI_API_KEY"

[agents.codex-unsandboxed]
command = ["codex", "--full-auto"]
pane_title_pattern = "codex"
status_pipe_name = "lince-status"
display_name = "OpenAI Codex (unsandboxed)"
short_label = "CDU"
color = "red"
sandboxed = false
has_native_hooks = false
ignore_wrapper_start = true
bwrap_conflict = false
providers = ["__discover__"]

[agents.codex-unsandboxed.env_vars]
OPENAI_API_KEY = "$OPENAI_API_KEY"

