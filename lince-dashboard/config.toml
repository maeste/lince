# Lince Dashboard Configuration

[dashboard]
# Default sandbox profile for new agents (empty = no -P flag)
# default_profile = ""

# Available sandbox profiles shown in the wizard selector.
# Auto-discovered from ~/.agent-sandbox/config.toml [profiles.*] sections.
# Override with an explicit list if needed:
# profiles = ["anthropic", "vertex"]

# Path to sandbox config for profile auto-discovery (default: ~/.agent-sandbox/config.toml)
# sandbox_config_path = "/custom/path/to/config.toml"

# Default working directory for new agents (empty = current dir)
# default_project_dir = ""

# Path to agent-sandbox command
sandbox_command = "agent-sandbox"

# Agent pane layout: "floating" (overlay, default) or "tiled" (fixed position in layout grid)
# Use "tiled" with layouts/dashboard-tiled.kdl for a split view (agents left, dashboard right)
agent_layout = "floating"

# How to show agent pane: "floating" (overlay) or "replace" (tab switch)
focus_mode = "floating"

# Status detection: "pipe" (zellij pipe, recommended) or "file" (/tmp polling)
status_method = "pipe"

# Directory for status files (when using file method)
status_file_dir = "/tmp/lince-dashboard"

# Maximum concurrent agents
max_agents = 8

# Sandbox backend preference: "auto" | "agent-sandbox" | "nono"
# - "auto" (default): on macOS, uses nono; on Linux, prefers agent-sandbox, falls back to nono
# - "agent-sandbox": use bubblewrap-based sandbox (Linux only)
# - "nono": use Landlock/Seatbelt sandbox (Linux + macOS)
# Individual agent types can override this in agents-defaults.toml or [agents.<name>].
sandbox_backend = "auto"

# Default agent type for new agents (matches a key in agents-defaults.toml)
# default_agent_type = "claude"

# ── Agent type overrides ──────────────────────────────────────────────
# Default agent configurations live in ~/.agent-sandbox/agents-defaults.toml.
# Override or add custom agents below.  Each [agents.<name>] section can set:
#   command, default_args, env, home_ro_dirs, home_rw_dirs,
#   bwrap_conflict, disable_inner_sandbox_args, profiles
#
# Example: override codex to use a custom model
# [agents.codex]
# default_args = ["--full-auto", "--model", "o4-mini"]
#
# Example: add a custom agent
# [agents.custom-agent]
# command = "my-agent"
# default_args = ["--auto"]
# env = {}
# home_ro_dirs = [".my-agent"]
# home_rw_dirs = []
# bwrap_conflict = false
# disable_inner_sandbox_args = []

# Zai (cc-mirror) agent types
[agents.zai]
command = ["agent-sandbox", "run", "-p", "{project_dir}", "--id", "{agent_id}"]
pane_title_pattern = "agent-sandbox"
status_pipe_name = "claude-status"
display_name = "Zai"
short_label = "ZAI"
color = "blue"
sandboxed = true
has_native_hooks = true
home_ro_dirs = ["~/.cc-mirror/zai/config/"]
profiles = ["__discover__"]

[agents.zai-unsandboxed]
command = ["zai"]
pane_title_pattern = "zai"
status_pipe_name = "claude-status"
display_name = "Zai (unsandboxed)"
short_label = "ZAU"
color = "blue"
sandboxed = false
has_native_hooks = true
profiles = ["__discover__"]

