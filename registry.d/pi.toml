# registry.d/pi.toml — SHIPPED agent definition. Always overwritten
# on update (#199 ownership contract) — user overrides and custom agents
# belong in the user config, never here.
#
# GENERATED by scripts/gen_registry.py from the legacy agents-defaults
# files (design: docs/design/config-v2-design.md §3). Regenerate with:
#     python3 scripts/gen_registry.py
# Guarded against drift by scripts/tests/test_registry_sync.py.

[agent]
name = "pi"
display_name = "Pi"
short_label = "PI "
color = "blue"
binary = "pi"
default_args = []

[sandbox]
backend = "auto"
default_level = "normal"
allowed_levels = []
home_subdir = ".pi"
bwrap_conflict = false
disable_inner_sandbox_args = []
home_ro_dirs = []
home_rw_dirs = [".pi"]

[sandbox.levels.paranoid]
scratch_home_dirs = [".pi"]
unshare_net = true
credential_proxy = true
allow_domains = []

[sandbox.levels.paranoid.env_extra]
ANTHROPIC_API_KEY = "$ANTHROPIC_API_KEY"
ANTHROPIC_AUTH_TOKEN = "$ANTHROPIC_AUTH_TOKEN"
OPENAI_API_KEY = "$OPENAI_API_KEY"
GEMINI_API_KEY = "$GEMINI_API_KEY"
GOOGLE_API_KEY = "$GOOGLE_API_KEY"

[sandbox.levels.permissive]
credential_proxy = false
block_git_push = true
allow_domains = ["api.github.com", "github.com", "objects.githubusercontent.com"]
home_ro_dirs = [".config/gh", ".cache", ".ssh/known_hosts"]
passthrough = ["GH_TOKEN", "GITHUB_TOKEN"]

[dashboard]
has_native_hooks = true
providers = ["__discover__"]

# provider_env = "all" expands to the union of all provider env-var
# NAMES from registry.d/providers.toml (design §3.4) — the 31-var
# multi-provider bundle is stored once, not copy-pasted 4x.
[env]
provider_env = "all"

# Once per agent; all variants inherit (design §3.5).
[event_map]
session_start = "input"
turn_start = "running"
tool_call = "running"
turn_end = "input"
session_shutdown = "stopped"
